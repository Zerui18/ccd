# ccd tmux configuration
# Prefix: Ctrl-a (like GNU Screen)
set-option -g prefix C-a
unbind C-b

# Detach: Ctrl-a d (standard) or Ctrl-a Ctrl-a (double-tap)
bind d detach-client
bind C-a detach-client

# No status bar — Claude Code occupies the full terminal
set-option -g status off

# Mouse support for Claude Code's TUI
set-option -g mouse on

# Large scrollback
set-option -g history-limit 50000

# No escape delay (critical for Claude Code's TUI responsiveness)
set-option -sg escape-time 10

# UTF-8 support
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"

# Propagate terminal resize
set-option -g aggressive-resize on
